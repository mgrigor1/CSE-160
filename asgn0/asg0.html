<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>asg0</title>
</head>

<body onload="main()">
    <canvas id="cnv1" width="400" height="400">
        Please use a browser that supports "canvas"
    </canvas>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>

    <br><br>
    <label for="x_coordinate_v1">v1: x</label>
    <input type="number" id="x_coordinate_v1" size="10">
    <label for="y_coordinate_v1">y</label>
    <input type="number" id="y_coordinate_v1" size="10">
    
    <br><br>
    <label for="x_coordinate_v2">v2: x</label>
    <input type="number" id="x_coordinate_v2" size="10">
    <label for="y_coordinate_v2">y</label>
    <input type="number" id="y_coordinate_v2" size="10">

    <br><br>
    <input type="button" value="Draw" onclick="handleDrawEvent()"></input>

    <br><br>
    <label for="operation-select">Operation:</label>
    <select name="operation" id="operation-select">
        <option value="">--Please choose an option--</option>
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="div">Divide</option>
        <option value="mul">Multiply</option>
        <option value="mag">Magnitude</option>
        <option value="nor">Normalize</option>
        <option value="ang">Angle between</option>
        <option value="area">Area</option>
    </select>

    <input type="number" name="scalar" id="scalar-num" size="10">

    <br><br>
    <input type="button" value="Draw" onclick="handleDrawOperationEvent()"></input>
</body>
</html>
